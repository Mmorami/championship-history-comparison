<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Championship History Dashboard</title>
  <link rel="stylesheet" href="/styles.css" />
</head>

<body>
  <main>
    <h1>Championship History Dashboard</h1>
    <p id="meta"></p>

    <section>
      <h2>Promotion Power Leaderboard</h2>
      <table id="leaderboard">
        <thead>
          <tr>
            <th data-key="rank">Rank</th>
            <th data-key="season_id">Season</th>
            <th data-key="team_name_canonical">Team</th>
            <th data-key="position">Pos</th>
            <th data-key="played">P</th>
            <th data-key="wins">W</th>
            <th data-key="draws">D</th>
            <th data-key="losses">L</th>
            <th data-key="points">Pts</th>
            <th data-key="ppg">PPG</th>
            <th data-key="goals_for">GF</th>
            <th data-key="goals_against">GA</th>
            <th data-key="goal_diff">GD</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>

    <section>
      <h2>Season Comparator</h2>
      <label for="season">Season:</label>
      <select id="season"></select>
      <label for="slice">Slice:</label>
      <select id="slice">
        <option value="all">All</option>
        <option value="top6">Top 6</option>
        <option value="promoted">Promoted</option>
      </select>
      <button id="load-season">Load</button>
      <table id="season-table">
        <thead>
          <tr>
            <th>Pos</th>
            <th>Team</th>
            <th>P</th>
            <th>W</th>
            <th>D</th>
            <th>L</th>
            <th>Pts</th>
            <th>GF</th>
            <th>GA</th>
            <th>GD</th>
            <th>Add</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>

    <section>
      <h2>Custom Comparison</h2>
      <div class="controls">
        <label for="custom-season">Season:</label>
        <select id="custom-season"></select>
        <label for="custom-team">Team:</label>
        <select id="custom-team"></select>
        <button id="add-custom">Add to View</button>
        <button id="clear-custom" class="danger">Clear All</button>
      </div>
      <table id="custom-comparison">
        <thead>
          <tr>
            <th>Season</th>
            <th>Team</th>
            <th>Pos</th>
            <th>P</th>
            <th>W</th>
            <th>D</th>
            <th>L</th>
            <th>Pts</th>
            <th>GF</th>
            <th>GA</th>
            <th>GD</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>

    <section>
      <h2>Team Context</h2>
      <p id="context-hint">Select a team row above to see managers and top scorers.</p>
      <div id="context-managers"></div>
      <div id="context-scorers"></div>
    </section>
  </main>
  <script src="/app.js"></script>
</body>

</html>
